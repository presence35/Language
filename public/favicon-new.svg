<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64" width="64" height="64">
  <!-- Left speech bubble (blue) -->
  <ellipse cx="24" cy="28" rx="18" ry="16" fill="#4A90D9" stroke="#2C5F8A" stroke-width="2"/>
  <polygon points="18,42 12,54 26,44" fill="#4A90D9" stroke="#2C5F8A" stroke-width="2"/>
  <polygon points="18,42 12,54 26,44" fill="#4A90D9"/>
  
  <!-- Right speech bubble (green) -->
  <ellipse cx="40" cy="28" rx="18" ry="16" fill="#5CB85C" stroke="#3A7A3A" stroke-width="2"/>
  <polygon points="46,42 52,54 38,44" fill="#5CB85C" stroke="#3A7A3A" stroke-width="2"/>
  <polygon points="46,42 52,54 38,44" fill="#5CB85C"/>
  
  <!-- Exchange arrows -->
  <path d="M28 26 L36 26" stroke="white" stroke-width="2.5" stroke-linecap="round" fill="none"/>
  <polygon points="34,23 38,26 34,29" fill="white"/>
  
  <path d="M36 32 L28 32" stroke="white" stroke-width="2.5" stroke-linecap="round" fill="none"/>
  <polygon points="30,29 26,32 30,35" fill="white"/>
  
  <!-- Simple cartoon eyes on left bubble -->
  <circle cx="18" cy="24" r="3" fill="white"/>
  <circle cx="30" cy="24" r="3" fill="white"/>
  <circle cx="19" cy="23" r="1.5" fill="#1a1a1a"/>
  <circle cx="31" cy="23" r="1.5" fill="#1a1a1a"/>
  
  <!-- Smile on left bubble -->
  <path d="M20 32 Q24 36 28 32" stroke="#1a1a1a" stroke-width="1.5" fill="none" stroke-linecap="round"/>
</svg>
